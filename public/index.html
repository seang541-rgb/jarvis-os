<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>子房 - AI Assistant</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #030308;
            --accent: #00d4ff;
            --accent2: #7b2fff;
            --speak: #00ff88;
            --warn: #ff6b35;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: #e0e8ff;
            height: 100vh;
            overflow: hidden;
        }

        canvas#fx {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .hud {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .orb-wrap {
            position: relative;
            width: 220px;
            height: 220px;
            margin-bottom: 24px;
        }

        #orb-canvas {
            width: 220px;
            height: 220px;
        }

        .status-bar {
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
            opacity: 0.8;
            transition: color 0.5s;
        }

        .status-bar.speaking { color: var(--speak); }
        .status-bar.thinking { color: var(--warn); }

        .subtitle {
            font-size: 0.85rem;
            color: #6b7db3;
            margin-bottom: 28px;
            min-height: 20px;
            transition: color 0.3s;
        }

        .waveform {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 60px;
            margin-bottom: 28px;
        }

        .wave-bar {
            width: 3px;
            height: 3px;
            border-radius: 2px;
            background: var(--accent);
            transition: height 0.05s;
        }

        .transcript-box {
            width: 90%;
            max-width: 520px;
            background: rgba(5, 8, 20, 0.85);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 12px;
            padding: 16px 20px;
            max-height: 240px;
            overflow-y: auto;
            text-align: left;
            backdrop-filter: blur(10px);
        }

        .entry { margin-bottom: 14px; animation: fadeUp 0.3s ease; }
        .entry:last-child { margin-bottom: 0; }
        .entry-label { font-size: 0.65rem; color: #4a5a8a; margin-bottom: 3px; letter-spacing: 1px; }
        .entry-text { font-size: 0.9rem; line-height: 1.6; }
        .entry-text.user { color: #c8d6f0; }
        .entry-text.ai { color: var(--accent); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 14px;
            z-index: 10;
            pointer-events: auto;
        }

        .btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .btn-mic {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }

        .btn-mic:hover { transform: scale(1.1); }
        .btn-mic.active { animation: micPulse 1.5s infinite; }

        @keyframes micPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4); }
            50% { box-shadow: 0 0 0 16px rgba(0, 212, 255, 0); }
        }

        .btn-sec {
            background: rgba(15, 20, 40, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: var(--accent);
        }

        .btn-sec:hover { background: rgba(0, 212, 255, 0.1); }

        .mode-tag {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Orbitron', monospace;
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: #4a5a8a;
            z-index: 10;
        }

        .mode-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #333;
            margin-right: 6px;
            vertical-align: middle;
            transition: all 0.3s;
        }

        .mode-dot.active {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 212, 255, 0.2); border-radius: 2px; }
    </style>
</head>
<body>
    <canvas id="fx"></canvas>

    <div class="mode-tag">
        <span class="mode-dot" id="mode-dot"></span>
        <span id="mode-text">STANDBY</span>
    </div>

    <div class="hud">
        <div class="orb-wrap">
            <canvas id="orb-canvas" width="440" height="440"></canvas>
        </div>

        <div class="status-bar" id="status">等待唤醒</div>
        <div class="subtitle" id="subtitle">按 Ctrl+Space 或说 "子房" 激活</div>

        <div class="waveform" id="waveform"></div>

        <div class="transcript-box" id="transcript">
            <div class="entry">
                <div class="entry-label">CHENGXIANG</div>
                <div class="entry-text ai">主公，子房在此，随时听候差遣。</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-sec" id="btn-settings" title="设置">⚙</button>
        <button class="btn btn-mic" id="btn-mic" title="按住说话">🎤</button>
        <button class="btn btn-sec" id="btn-clear" title="清空">🗑</button>
    </div>

    <script>
    // ============================================================
    //  PARTICLE SYSTEM
    // ============================================================
    const fxCanvas = document.getElementById('fx');
    const fxCtx = fxCanvas.getContext('2d');
    let W, H;

    function resizeFx() {
        W = fxCanvas.width = window.innerWidth;
        H = fxCanvas.height = window.innerHeight;
    }
    resizeFx();
    window.addEventListener('resize', resizeFx);

    const PARTICLE_COUNT = 80;
    const CONNECT_DIST = 130;

    class Particle {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * W;
            this.y = Math.random() * H;
            this.vx = (Math.random() - 0.5) * 0.3;
            this.vy = (Math.random() - 0.5) * 0.3;
            this.r = Math.random() * 1.5 + 0.5;
            this.baseAlpha = Math.random() * 0.3 + 0.1;
            this.alpha = this.baseAlpha;
            this.pulse = Math.random() * Math.PI * 2;
        }
        update(audioLevel) {
            this.pulse += 0.02;
            const boost = 1 + audioLevel * 2;
            this.x += this.vx * boost;
            this.y += this.vy * boost;
            this.alpha = this.baseAlpha + audioLevel * 0.3 + Math.sin(this.pulse) * 0.05;
            if (this.x < 0 || this.x > W) this.vx *= -1;
            if (this.y < 0 || this.y > H) this.vy *= -1;
        }
        draw(ctx, color) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = color.replace('1)', `${this.alpha})`);
            ctx.fill();
        }
    }

    const particles = Array.from({ length: PARTICLE_COUNT }, () => new Particle());

    let particleColor = 'rgba(0, 212, 255, 1)';

    function drawParticles(audioLevel) {
        fxCtx.clearRect(0, 0, W, H);
        for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            p.update(audioLevel);
            p.draw(fxCtx, particleColor);
            for (let j = i + 1; j < particles.length; j++) {
                const q = particles[j];
                const dx = p.x - q.x;
                const dy = p.y - q.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < CONNECT_DIST) {
                    const a = (1 - dist / CONNECT_DIST) * 0.12 * (1 + audioLevel);
                    fxCtx.beginPath();
                    fxCtx.moveTo(p.x, p.y);
                    fxCtx.lineTo(q.x, q.y);
                    fxCtx.strokeStyle = particleColor.replace('1)', `${a})`);
                    fxCtx.lineWidth = 0.5;
                    fxCtx.stroke();
                }
            }
        }
    }

    // ============================================================
    //  ORB RENDERER
    // ============================================================
    const orbCanvas = document.getElementById('orb-canvas');
    const orbCtx = orbCanvas.getContext('2d');
    const OW = 440, OH = 440, OCX = OW / 2, OCY = OH / 2;

    let orbState = 'idle';
    let orbGlow = 0;
    let orbPhase = 0;

    const ORB_COLORS = {
        idle:     { inner: '#00d4ff', outer: '#7b2fff', glow: 'rgba(0,212,255,0.3)' },
        listening:{ inner: '#00e5ff', outer: '#536dfe', glow: 'rgba(0,229,255,0.5)' },
        thinking:{ inner: '#ffab40', outer: '#ff6d00', glow: 'rgba(255,171,64,0.4)' },
        speaking:{ inner: '#00e676', outer: '#00c853', glow: 'rgba(0,230,118,0.5)' },
    };

    function drawOrb(audioLevel) {
        orbCtx.clearRect(0, 0, OW, OH);
        orbPhase += 0.015;

        const c = ORB_COLORS[orbState] || ORB_COLORS.idle;
        const breathe = 1 + Math.sin(orbPhase) * 0.04 + audioLevel * 0.08;
        const r = 70 * breathe;

        // outer glow
        const grad3 = orbCtx.createRadialGradient(OCX, OCY, r * 0.5, OCX, OCY, r * 2.5);
        grad3.addColorStop(0, c.glow);
        grad3.addColorStop(1, 'transparent');
        orbCtx.fillStyle = grad3;
        orbCtx.fillRect(0, 0, OW, OH);

        // rings
        for (let i = 0; i < 3; i++) {
            const ringR = r + 20 + i * 22;
            const ringAlpha = 0.15 - i * 0.04 + audioLevel * 0.1;
            const rot = orbPhase * (i % 2 === 0 ? 0.5 : -0.3) + i * 1.2;
            orbCtx.save();
            orbCtx.translate(OCX, OCY);
            orbCtx.rotate(rot);
            orbCtx.beginPath();
            orbCtx.ellipse(0, 0, ringR, ringR * 0.35, 0, 0, Math.PI * 2);
            orbCtx.strokeStyle = c.inner.replace(')', `,${ringAlpha})`).replace('rgb', 'rgba');
            orbCtx.lineWidth = 1.2;
            orbCtx.stroke();
            orbCtx.restore();
        }

        // main orb
        const grad = orbCtx.createRadialGradient(OCX - r * 0.25, OCY - r * 0.25, r * 0.1, OCX, OCY, r);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.3, c.inner);
        grad.addColorStop(1, c.outer);
        orbCtx.beginPath();
        orbCtx.arc(OCX, OCY, r, 0, Math.PI * 2);
        orbCtx.fillStyle = grad;
        orbCtx.fill();

        // inner highlight
        const grad2 = orbCtx.createRadialGradient(OCX - r * 0.3, OCY - r * 0.3, 0, OCX, OCY, r * 0.6);
        grad2.addColorStop(0, 'rgba(255,255,255,0.25)');
        grad2.addColorStop(1, 'transparent');
        orbCtx.beginPath();
        orbCtx.arc(OCX, OCY, r * 0.6, 0, Math.PI * 2);
        orbCtx.fillStyle = grad2;
        orbCtx.fill();

        // audio reactive spikes
        if (audioLevel > 0.05) {
            const spikeCount = 12;
            for (let i = 0; i < spikeCount; i++) {
                const angle = (Math.PI * 2 / spikeCount) * i + orbPhase;
                const spikeLen = audioLevel * 30 + 5;
                const sx = OCX + Math.cos(angle) * r;
                const sy = OCY + Math.sin(angle) * r;
                const ex = OCX + Math.cos(angle) * (r + spikeLen);
                const ey = OCY + Math.sin(angle) * (r + spikeLen);
                orbCtx.beginPath();
                orbCtx.moveTo(sx, sy);
                orbCtx.lineTo(ex, ey);
                orbCtx.strokeStyle = c.inner.replace(')', `,${0.4 + audioLevel * 0.4})`).replace('rgb', 'rgba');
                orbCtx.lineWidth = 1.5;
                orbCtx.stroke();
            }
        }
    }

    // ============================================================
    //  WAVEFORM
    // ============================================================
    const waveformEl = document.getElementById('waveform');
    const BAR_COUNT = 40;
    for (let i = 0; i < BAR_COUNT; i++) {
        const bar = document.createElement('div');
        bar.className = 'wave-bar';
        waveformEl.appendChild(bar);
    }
    const waveBars = waveformEl.querySelectorAll('.wave-bar');

    function updateWaveform(audioLevel, active) {
        waveBars.forEach((bar, i) => {
            if (active) {
                const h = 3 + audioLevel * 50 * (0.5 + Math.sin(Date.now() * 0.005 + i * 0.4) * 0.5);
                bar.style.height = h + 'px';
                bar.style.background = orbState === 'speaking'
                    ? `linear-gradient(to top, #00e676, #00c853)`
                    : `linear-gradient(to top, #00d4ff, #7b2fff)`;
            } else {
                bar.style.height = '3px';
            }
        });
    }

    // ============================================================
    //  AUDIO ANALYSIS
    // ============================================================
    let audioCtx = null;
    let analyser = null;
    let audioDataArray = null;
    let currentAudioEl = null;

    function initAudioContext() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        audioDataArray = new Uint8Array(analyser.frequencyBinCount);
    }

    function getAudioLevel() {
        if (!analyser || !audioDataArray) return 0;
        analyser.getByteFrequencyData(audioDataArray);
        let sum = 0;
        for (let i = 0; i < audioDataArray.length; i++) sum += audioDataArray[i];
        return sum / audioDataArray.length / 255;
    }

    function connectAudioElement(audioEl) {
        initAudioContext();
        if (currentAudioEl) {
            try { currentAudioEl.disconnect(); } catch(e) {}
        }
        const source = audioCtx.createMediaElementSource(audioEl);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        currentAudioEl = source;
    }

    // ============================================================
    //  STATE
    // ============================================================
    const state = {
        listening: false,
        speaking: false,
        continuous: true,
        ttsEnabled: true,
    };

    const statusEl = document.getElementById('status');
    const subtitleEl = document.getElementById('subtitle');
    const transcriptEl = document.getElementById('transcript');
    const modeDot = document.getElementById('mode-dot');
    const modeText = document.getElementById('mode-text');

    function updateUI() {
        if (state.speaking) {
            orbState = 'speaking';
            particleColor = 'rgba(0, 230, 118, 1)';
            statusEl.textContent = '子房朗读中';
            statusEl.className = 'status-bar speaking';
            modeText.textContent = 'SPEAKING';
        } else if (state.listening) {
            orbState = 'listening';
            particleColor = 'rgba(0, 212, 255, 1)';
            statusEl.textContent = '聆听中...';
            statusEl.className = 'status-bar';
            modeText.textContent = 'LISTENING';
        } else {
            orbState = 'idle';
            particleColor = 'rgba(0, 212, 255, 1)';
            statusEl.textContent = '等待唤醒';
            statusEl.className = 'status-bar';
            modeText.textContent = 'STANDBY';
        }
        modeDot.className = 'mode-dot' + (state.listening || state.speaking ? ' active' : '');
    }

    // ============================================================
    //  RENDER LOOP
    // ============================================================
    function render() {
        const audioLevel = getAudioLevel();
        drawParticles(audioLevel);
        drawOrb(audioLevel);
        updateWaveform(audioLevel, state.listening || state.speaking);
        requestAnimationFrame(render);
    }
    render();

    // ============================================================
    //  WEBSOCKET
    // ============================================================
    let ws;
    let isConnected = false;
    let currentTranscript = '';

    function connect() {
        ws = new WebSocket(`ws://${window.location.host}`);
        ws.onopen = () => {
            isConnected = true;
            console.log('Connected');
        };
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'response_start') {
                state.speaking = true;
                currentTranscript = '';
                updateUI();
            } else if (data.type === 'response_chunk') {
                currentTranscript += data.text;
                updateLastAIEntry(currentTranscript);
            } else if (data.type === 'response_end') {
                state.speaking = false;
                updateUI();
                if (data.fullText && state.ttsEnabled) {
                    speak(data.fullText);
                } else if (state.continuous) {
                    setTimeout(() => startListening(), 500);
                }
            }
        };
        ws.onclose = () => { isConnected = false; setTimeout(connect, 2000); };
        ws.onerror = () => { isConnected = false; };
    }
    connect();

    // ============================================================
    //  SPEECH RECOGNITION
    // ============================================================
    let recognition = null;
    let isRecognizing = false;
    let silenceTimer = null;
    let accumulatedText = '';
    const SILENCE_DELAY = 2500;

    function startListening() {
        if (isRecognizing || state.speaking) return;
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) return;

        if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
        accumulatedText = '';
        if (recognition) { try { recognition.abort(); } catch(e) {} }

        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SR();
        recognition.lang = 'zh-CN';
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.maxAlternatives = 3;

        recognition.onstart = () => {
            isRecognizing = true;
            state.listening = true;
            updateUI();
        };

        recognition.onresult = (e) => {
            if (state.speaking) return;
            let interim = '';
            for (let i = e.resultIndex; i < e.results.length; i++) {
                const t = e.results[i][0].transcript;
                if (e.results[i].isFinal) accumulatedText += t;
                else interim += t;
            }
            subtitleEl.textContent = (accumulatedText + interim) ? `"${accumulatedText + interim}"` : '';
            resetSilenceTimer();
        };

        recognition.onend = () => {
            if (accumulatedText.trim()) {
                addUserEntry(accumulatedText.trim());
                sendMessage(accumulatedText.trim());
            }
            accumulatedText = '';
            isRecognizing = false;
            state.listening = false;
            updateUI();
            if (state.continuous && !state.speaking) {
                setTimeout(() => { if (!state.speaking) startListening(); }, 800);
            }
        };

        recognition.onerror = (e) => {
            if (e.error === 'no-speech' || e.error === 'aborted') return;
            isRecognizing = false;
            state.listening = false;
            updateUI();
            if (state.continuous && !state.speaking) {
                setTimeout(() => { if (!state.speaking) startListening(); }, 3000);
            }
        };

        try { recognition.start(); } catch(e) {}
    }

    function resetSilenceTimer() {
        if (silenceTimer) clearTimeout(silenceTimer);
        silenceTimer = setTimeout(() => {
            if (accumulatedText.trim()) {
                addUserEntry(accumulatedText.trim());
                sendMessage(accumulatedText.trim());
                accumulatedText = '';
                if (recognition) { try { recognition.stop(); } catch(e) {} }
            }
        }, SILENCE_DELAY);
    }

    function stopListening() {
        if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
        if (accumulatedText.trim()) {
            addUserEntry(accumulatedText.trim());
            sendMessage(accumulatedText.trim());
            accumulatedText = '';
        }
        if (recognition) { try { recognition.stop(); } catch(e) {} }
        isRecognizing = false;
        state.listening = false;
        updateUI();
    }

    // ============================================================
    //  TTS (edge-tts server-side)
    // ============================================================
    function speak(text) {
        if (!state.ttsEnabled) {
            if (state.continuous) setTimeout(() => startListening(), 500);
            return;
        }
        stopListening();
        state.speaking = true;
        updateUI();

        initAudioContext();

        fetch('/api/tts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
        })
        .then(r => r.blob())
        .then(blob => {
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.crossOrigin = 'anonymous';

            audio.onplay = () => {
                connectAudioElement(audio);
                console.log('🗣️ 子房朗读中');
            };
            audio.onended = () => {
                state.speaking = false;
                updateUI();
                URL.revokeObjectURL(url);
                if (state.continuous) setTimeout(() => startListening(), 800);
            };
            audio.onerror = () => {
                state.speaking = false;
                updateUI();
                URL.revokeObjectURL(url);
                if (state.continuous) setTimeout(() => startListening(), 800);
            };
            audio.play().catch(() => {
                state.speaking = false;
                updateUI();
                URL.revokeObjectURL(url);
            });
        })
        .catch(() => {
            state.speaking = false;
            updateUI();
            if (state.continuous) setTimeout(() => startListening(), 800);
        });
    }

    // ============================================================
    //  TRANSCRIPT
    // ============================================================
    function sendMessage(text) {
        if (!text.trim()) return;
        subtitleEl.textContent = '';
        const msg = JSON.stringify({ type: 'chat', text });
        if (isConnected && ws.readyState === WebSocket.OPEN) ws.send(msg);
    }

    function addUserEntry(text) {
        const el = document.createElement('div');
        el.className = 'entry';
        el.innerHTML = `<div class="entry-label">YOU</div><div class="entry-text user">${text}</div>`;
        transcriptEl.appendChild(el);
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }

    function updateLastAIEntry(text) {
        let last = transcriptEl.querySelector('.entry:last-child .entry-text.ai');
        if (!last || last.parentElement.querySelector('.entry-label').textContent !== 'CHENGXIANG') {
            const el = document.createElement('div');
            el.className = 'entry';
            el.innerHTML = `<div class="entry-label">CHENGXIANG</div><div class="entry-text ai">${text}</div>`;
            transcriptEl.appendChild(el);
        } else {
            last.textContent = text;
        }
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }

    // ============================================================
    //  CONTROLS
    // ============================================================
    document.getElementById('btn-mic').addEventListener('click', () => {
        if (isRecognizing) stopListening(); else startListening();
    });
    document.getElementById('btn-mic').addEventListener('mousedown', () => {
        if (!isRecognizing) startListening();
    });
    document.getElementById('btn-clear').addEventListener('click', () => {
        transcriptEl.innerHTML = '<div class="entry"><div class="entry-label">CHENGXIANG</div><div class="entry-text ai">对话已清空。主公有何吩咐？</div></div>';
    });

    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.code === 'Space') {
            e.preventDefault();
            if (isRecognizing) stopListening(); else startListening();
        }
        if (e.code === 'Escape') stopListening();
    });

    // ============================================================
    //  INIT
    // ============================================================
    updateUI();
    </script>
</body>
</html>
