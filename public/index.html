<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小市 - AI Assistant</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #030308;
            --accent: #00d4ff;
            --accent2: #7b2fff;
            --speak: #00ff88;
            --warn: #ff6b35;
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: #e0e8ff;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        canvas#fx { position: fixed; inset: 0; z-index: 0; }

        .live2d-wrap {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 45%;
            min-width: 300px;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #live2d-canvas { width: 100%; height: 100%; }

        .right-panel {
            position: fixed;
            right: 0; top: 0; bottom: 0;
            width: 55%;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            pointer-events: none;
        }

        .mode-tag {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            font-family: 'Orbitron', monospace; font-size: 0.6rem;
            letter-spacing: 3px; color: #4a5a8a; z-index: 10;
        }
        .mode-dot {
            display: inline-block; width: 6px; height: 6px; border-radius: 50%;
            background: #333; margin-right: 6px; vertical-align: middle; transition: all 0.3s;
        }
        .mode-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        .status-bar {
            font-family: 'Orbitron', monospace; font-size: 0.75rem;
            letter-spacing: 4px; text-transform: uppercase;
            color: var(--accent); margin-bottom: 8px; opacity: 0.8; transition: color 0.5s;
        }
        .status-bar.speaking { color: var(--speak); }
        .status-bar.thinking { color: var(--warn); }

        .subtitle {
            font-size: 0.85rem; color: #6b7db3; margin-bottom: 20px;
            min-height: 20px; transition: color 0.3s;
        }

        .waveform { display: flex; align-items: center; justify-content: center; gap: 3px; height: 50px; margin-bottom: 20px; }
        .wave-bar { width: 3px; height: 3px; border-radius: 2px; background: var(--accent); transition: height 0.05s; }

        .transcript-box {
            width: 100%; max-width: 480px;
            background: rgba(5, 8, 20, 0.85); border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 12px; padding: 16px 20px; max-height: 260px;
            overflow-y: auto; text-align: left; backdrop-filter: blur(10px);
            pointer-events: auto;
        }
        .entry { margin-bottom: 14px; animation: fadeUp 0.3s ease; }
        .entry:last-child { margin-bottom: 0; }
        .entry-label { font-size: 0.65rem; color: #4a5a8a; margin-bottom: 3px; letter-spacing: 1px; }
        .entry-text { font-size: 0.9rem; line-height: 1.6; }
        .entry-text.user { color: #c8d6f0; }
        .entry-text.ai { color: var(--accent); }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .controls {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 14px; z-index: 10; pointer-events: auto;
        }
        .btn {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            cursor: pointer; font-size: 1.2rem; display: flex;
            align-items: center; justify-content: center; transition: all 0.3s;
        }
        .btn-mic {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white; box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }
        .btn-mic:hover { transform: scale(1.1); }
        .btn-mic.active { animation: micPulse 1.5s infinite; }
        @keyframes micPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4); }
            50% { box-shadow: 0 0 0 16px rgba(0, 212, 255, 0); }
        }
        .btn-sec { background: rgba(15, 20, 40, 0.8); border: 1px solid rgba(0, 212, 255, 0.2); color: var(--accent); }
        .btn-sec:hover { background: rgba(0, 212, 255, 0.1); }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 212, 255, 0.2); border-radius: 2px; }

        @media (max-width: 900px) {
            .live2d-wrap { width: 100%; min-width: 0; }
            .right-panel { display: none; }
        }
    </style>
</head>
<body>
    <canvas id="fx"></canvas>

    <div class="live2d-wrap">
        <canvas id="live2d-canvas"></canvas>
    </div>

    <div class="mode-tag">
        <span class="mode-dot" id="mode-dot"></span>
        <span id="mode-text">STANDBY</span>
    </div>

    <div class="right-panel">
        <div class="status-bar" id="status">等待唤醒</div>
        <div class="subtitle" id="subtitle">按 Ctrl+Space 或说 "小市" 激活</div>
        <div class="waveform" id="waveform"></div>
        <div class="transcript-box" id="transcript">
            <div class="entry">
                <div class="entry-label">ZIFANG</div>
                <div class="entry-text ai">主公，小市在这里哦～有什么想聊的吗？</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-mic" id="btn-mic" title="按住说话">🎤</button>
        <button class="btn btn-sec" id="btn-clear" title="清空">🗑</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/index.min.js"></script>
    <script>
    // ============================================================
    //  PARTICLE SYSTEM
    // ============================================================
    const fxCanvas = document.getElementById('fx');
    const fxCtx = fxCanvas.getContext('2d');
    let W, H;
    function resizeFx() { W = fxCanvas.width = window.innerWidth; H = fxCanvas.height = window.innerHeight; }
    resizeFx(); window.addEventListener('resize', resizeFx);

    const PARTICLE_COUNT = 60;
    const CONNECT_DIST = 120;
    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * W; this.y = Math.random() * H;
            this.vx = (Math.random() - 0.5) * 0.25; this.vy = (Math.random() - 0.5) * 0.25;
            this.r = Math.random() * 1.5 + 0.5; this.baseAlpha = Math.random() * 0.25 + 0.08;
            this.alpha = this.baseAlpha; this.pulse = Math.random() * Math.PI * 2;
        }
        update(al) {
            this.pulse += 0.02; const b = 1 + al * 2;
            this.x += this.vx * b; this.y += this.vy * b;
            this.alpha = this.baseAlpha + al * 0.3 + Math.sin(this.pulse) * 0.04;
            if (this.x < 0 || this.x > W) this.vx *= -1;
            if (this.y < 0 || this.y > H) this.vy *= -1;
        }
        draw(ctx, c) {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = c.replace('1)', `${this.alpha})`); ctx.fill();
        }
    }
    const particles = Array.from({ length: PARTICLE_COUNT }, () => new Particle());
    let particleColor = 'rgba(0, 212, 255, 1)';
    function drawParticles(al) {
        fxCtx.clearRect(0, 0, W, H);
        for (let i = 0; i < particles.length; i++) {
            const p = particles[i]; p.update(al); p.draw(fxCtx, particleColor);
            for (let j = i + 1; j < particles.length; j++) {
                const q = particles[j]; const dx = p.x - q.x; const dy = p.y - q.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < CONNECT_DIST) {
                    const a = (1 - dist / CONNECT_DIST) * 0.1 * (1 + al);
                    fxCtx.beginPath(); fxCtx.moveTo(p.x, p.y); fxCtx.lineTo(q.x, q.y);
                    fxCtx.strokeStyle = particleColor.replace('1)', `${a})`); fxCtx.lineWidth = 0.5; fxCtx.stroke();
                }
            }
        }
    }

    // ============================================================
    //  WAVEFORM
    // ============================================================
    const waveformEl = document.getElementById('waveform');
    const BAR_COUNT = 35;
    for (let i = 0; i < BAR_COUNT; i++) {
        const bar = document.createElement('div'); bar.className = 'wave-bar'; waveformEl.appendChild(bar);
    }
    const waveBars = waveformEl.querySelectorAll('.wave-bar');
    function updateWaveform(al, active) {
        waveBars.forEach((bar, i) => {
            bar.style.height = active ? (3 + al * 45 * (0.5 + Math.sin(Date.now() * 0.005 + i * 0.4) * 0.5)) + 'px' : '3px';
            bar.style.background = orbState === 'speaking' ? '#00e676' : '#00d4ff';
        });
    }

    // ============================================================
    //  AUDIO ANALYSIS
    // ============================================================
    let audioCtx = null, analyser = null, audioDataArray = null, currentAudioEl = null;
    function initAudioContext() { if (audioCtx) return; audioCtx = new (window.AudioContext || window.webkitAudioContext)(); analyser = audioCtx.createAnalyser(); analyser.fftSize = 256; audioDataArray = new Uint8Array(analyser.frequencyBinCount); }
    function getAudioLevel() { if (!analyser || !audioDataArray) return 0; analyser.getByteFrequencyData(audioDataArray); let s = 0; for (let i = 0; i < audioDataArray.length; i++) s += audioDataArray[i]; return s / audioDataArray.length / 255; }
    function connectAudioElement(el) {
        initAudioContext(); if (currentAudioEl) { try { currentAudioEl.disconnect(); } catch(e) {} }
        const src = audioCtx.createMediaElementSource(el); src.connect(analyser); analyser.connect(audioCtx.destination); currentAudioEl = src;
    }

    // ============================================================
    //  STATE
    // ============================================================
    const state = { listening: false, speaking: false, continuous: true, ttsEnabled: true };
    let orbState = 'idle';
    const statusEl = document.getElementById('status');
    const subtitleEl = document.getElementById('subtitle');
    const transcriptEl = document.getElementById('transcript');
    const modeDot = document.getElementById('mode-dot');
    const modeText = document.getElementById('mode-text');

    function updateUI() {
        if (state.speaking) { orbState = 'speaking'; particleColor = 'rgba(0, 230, 118, 1)'; statusEl.textContent = '小市朗读中'; statusEl.className = 'status-bar speaking'; modeText.textContent = 'SPEAKING'; }
        else if (state.listening) { orbState = 'listening'; particleColor = 'rgba(0, 212, 255, 1)'; statusEl.textContent = '聆听中...'; statusEl.className = 'status-bar'; modeText.textContent = 'LISTENING'; }
        else { orbState = 'idle'; particleColor = 'rgba(0, 212, 255, 1)'; statusEl.textContent = '等待唤醒'; statusEl.className = 'status-bar'; modeText.textContent = 'STANDBY'; }
        modeDot.className = 'mode-dot' + (state.listening || state.speaking ? ' active' : '');
        updateLive2DExpression();
    }

    // ============================================================
    //  LIVE2D
    // ============================================================
    let live2dModel = null;
    let live2dApp = null;

    async function initLive2D() {
        const container = document.querySelector('.live2d-wrap');
        const canvas = document.getElementById('live2d-canvas');

        live2dApp = new PIXI.Application({
            view: canvas,
            width: container.clientWidth,
            height: container.clientHeight,
            backgroundColor: 0x030308,
            backgroundAlpha: 0,
            antialias: true,
            autoDensity: true,
            resolution: window.devicePixelRatio || 1,
        });

        try {
            const modelUrl = 'https://cdn.jsdelivr.net/gh/guansss/pixi-live2d-display/test/assets/haru/haru_greeter_t03.model3.json';
            live2dModel = await PIXI.live2d.Live2DModel.from(modelUrl, { autoInteract: false });

            const scale = Math.min(
                container.clientWidth / live2dModel.width * 0.85,
                container.clientHeight / live2dModel.height * 0.85
            );
            live2dModel.scale.set(scale);
            live2dModel.anchor.set(0.5, 0.5);
            live2dModel.x = container.clientWidth / 2;
            live2dModel.y = container.clientHeight / 2;

            live2dApp.stage.addChild(live2dModel);

            live2dModel.on('hit', (hitAreas) => {
                console.log('Hit:', hitAreas);
            });

            console.log('Live2D loaded');
        } catch (e) {
            console.error('Live2D load failed:', e);
        }

        window.addEventListener('resize', () => {
            if (!live2dApp || !live2dModel) return;
            const w = container.clientWidth, h = container.clientHeight;
            live2dApp.renderer.resize(w, h);
            const s = Math.min(w / live2dModel.width * 0.85, h / live2dModel.height * 0.85);
            live2dModel.scale.set(s);
            live2dModel.x = w / 2;
            live2dModel.y = h / 2;
        });
    }

    function updateLive2DExpression() {
        if (!live2dModel) return;
        try {
            if (orbState === 'speaking') {
                cycleSpeakingExpression();
            } else if (orbState === 'listening') {
                live2dModel.expression('f02');
            } else {
                live2dModel.expression('f00');
            }
        } catch (e) {}
    }

    let speakExprTimer = null;
    let lastSpeakExpr = '';
    const speakExpressions = ['f01', 'f02', 'f03', 'f04', 'f05'];

    function cycleSpeakingExpression() {
        if (speakExprTimer) return;
        const pick = () => {
            let expr = speakExpressions[Math.floor(Math.random() * speakExpressions.length)];
            if (expr === lastSpeakExpr) expr = speakExpressions[(speakExpressions.indexOf(expr) + 1) % speakExpressions.length];
            lastSpeakExpr = expr;
            try { live2dModel.expression(expr); } catch(e) {}
        };
        pick();
        speakExprTimer = setInterval(() => { if (orbState === 'speaking') pick(); else { clearInterval(speakExprTimer); speakExprTimer = null; } }, 1500 + Math.random() * 1000);
    }

    function updateLive2DLipSync(audioLevel) {
        if (!live2dModel) return;
        try {
            const coreModel = live2dModel.internalModel?.coreModel;
            if (!coreModel) return;
            const mouthIdx = coreModel.getParameterIndex('ParamMouthOpenY');
            if (mouthIdx >= 0) coreModel.setParameterValueById('ParamMouthOpenY', audioLevel * 2.0);
            const angleIdx = coreModel.getParameterIndex('ParamAngleZ');
            if (angleIdx >= 0) coreModel.setParameterValueById('ParamAngleZ', Math.sin(Date.now() * 0.001) * 8 + audioLevel * 5);
            const bodyIdx = coreModel.getParameterIndex('ParamBodyAngleX');
            if (bodyIdx >= 0) coreModel.setParameterValueById('ParamBodyAngleX', Math.sin(Date.now() * 0.0007) * 3);
            const eyeIdx = coreModel.getParameterIndex('ParamEyeLOpen');
            if (eyeIdx >= 0 && Math.random() < 0.005) {
                coreModel.setParameterValueById('ParamEyeLOpen', 0);
                coreModel.setParameterValueById('ParamEyeROpen', 0);
                setTimeout(() => {
                    try {
                        coreModel.setParameterValueById('ParamEyeLOpen', 1);
                        coreModel.setParameterValueById('ParamEyeROpen', 1);
                    } catch(e) {}
                }, 150);
            }
        } catch (e) {}
    }

    // ============================================================
    //  RENDER LOOP
    // ============================================================
    function render() {
        const al = getAudioLevel();
        drawParticles(al);
        updateWaveform(al, state.listening || state.speaking);
        updateLive2DLipSync(al);
        requestAnimationFrame(render);
    }

    // ============================================================
    //  WEBSOCKET
    // ============================================================
    let ws, isConnected = false, currentTranscript = '';
    function connect() {
        ws = new WebSocket(`ws://${window.location.host}`);
        ws.onopen = () => { isConnected = true; };
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if (d.type === 'response_start') { state.speaking = true; currentTranscript = ''; updateUI(); }
            else if (d.type === 'response_chunk') { currentTranscript += d.text; updateLastAIEntry(currentTranscript); }
            else if (d.type === 'response_end') {
                state.speaking = false; updateUI();
                const songMatch = d.fullText?.match(/《(.+?)》/);
                if (songMatch && d.fullText.includes('演唱')) {
                    sing(songMatch[1]);
                } else if (d.fullText && state.ttsEnabled) {
                    speak(d.fullText);
                } else if (state.continuous) setTimeout(() => startListening(), 500);
            }
        };
        ws.onclose = () => { isConnected = false; setTimeout(connect, 2000); };
        ws.onerror = () => { isConnected = false; };
    }
    connect();

    // ============================================================
    //  SPEECH RECOGNITION
    // ============================================================
    let recognition = null, isRecognizing = false, silenceTimer = null, accumulatedText = '';
    const SILENCE_DELAY = 2500;

    function startListening() {
        if (isRecognizing || state.speaking) return;
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) return;
        if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
        accumulatedText = '';
        if (recognition) { try { recognition.abort(); } catch(e) {} }
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SR(); recognition.lang = 'zh-CN'; recognition.continuous = true;
        recognition.interimResults = true; recognition.maxAlternatives = 3;
        recognition.onstart = () => { isRecognizing = true; state.listening = true; updateUI(); };
        recognition.onresult = (e) => {
            if (state.speaking) return; let interim = '';
            for (let i = e.resultIndex; i < e.results.length; i++) { const t = e.results[i][0].transcript; if (e.results[i].isFinal) accumulatedText += t; else interim += t; }
            subtitleEl.textContent = (accumulatedText + interim) ? `"${accumulatedText + interim}"` : ''; resetSilenceTimer();
        };
        recognition.onend = () => {
            if (accumulatedText.trim()) { addUserEntry(accumulatedText.trim()); sendMessage(accumulatedText.trim()); }
            accumulatedText = ''; isRecognizing = false; state.listening = false; updateUI();
            if (state.continuous && !state.speaking) setTimeout(() => { if (!state.speaking) startListening(); }, 800);
        };
        recognition.onerror = (e) => {
            if (e.error === 'no-speech' || e.error === 'aborted') return;
            isRecognizing = false; state.listening = false; updateUI();
            if (state.continuous && !state.speaking) setTimeout(() => { if (!state.speaking) startListening(); }, 3000);
        };
        try { recognition.start(); } catch(e) {}
    }
    function resetSilenceTimer() {
        if (silenceTimer) clearTimeout(silenceTimer);
        silenceTimer = setTimeout(() => {
            if (accumulatedText.trim()) { addUserEntry(accumulatedText.trim()); sendMessage(accumulatedText.trim()); accumulatedText = ''; if (recognition) { try { recognition.stop(); } catch(e) {} } }
        }, SILENCE_DELAY);
    }
    function stopListening() {
        if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
        if (accumulatedText.trim()) { addUserEntry(accumulatedText.trim()); sendMessage(accumulatedText.trim()); accumulatedText = ''; }
        if (recognition) { try { recognition.stop(); } catch(e) {} }
        isRecognizing = false; state.listening = false; updateUI();
    }

    // ============================================================
    //  TTS
    // ============================================================
    function speak(text) {
        if (!state.ttsEnabled) { if (state.continuous) setTimeout(() => startListening(), 500); return; }
        stopListening(); state.speaking = true; updateUI(); initAudioContext();
        fetch('/api/tts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) })
        .then(r => r.blob()).then(blob => {
            const url = URL.createObjectURL(blob); const audio = new Audio(url); audio.crossOrigin = 'anonymous';
            audio.onplay = () => { connectAudioElement(audio); };
            audio.onended = () => { state.speaking = false; updateUI(); URL.revokeObjectURL(url); if (state.continuous) setTimeout(() => startListening(), 800); };
            audio.onerror = () => { state.speaking = false; updateUI(); URL.revokeObjectURL(url); if (state.continuous) setTimeout(() => startListening(), 800); };
            audio.play().catch(() => { state.speaking = false; updateUI(); URL.revokeObjectURL(url); });
        }).catch(() => { state.speaking = false; updateUI(); if (state.continuous) setTimeout(() => startListening(), 800); });
    }

    function sing(songName) {
        stopListening(); state.speaking = true; updateUI(); initAudioContext();
        fetch('/api/sing', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ song: songName }) })
        .then(r => r.json()).then(data => {
            if (data.error) { state.speaking = false; updateUI(); speak(data.error); return; }
            const binary = atob(data.audio);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            const blob = new Blob([bytes], { type: 'audio/mpeg' });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url); audio.crossOrigin = 'anonymous';
            audio.onplay = () => { connectAudioElement(audio); addAIEntry(`♪ 正在演唱《${data.song}》...`); };
            audio.onended = () => { state.speaking = false; updateUI(); URL.revokeObjectURL(url); if (state.continuous) setTimeout(() => startListening(), 800); };
            audio.onerror = () => { state.speaking = false; updateUI(); URL.revokeObjectURL(url); if (state.continuous) setTimeout(() => startListening(), 800); };
            audio.play().catch(() => { state.speaking = false; updateUI(); URL.revokeObjectURL(url); });
        }).catch(() => { state.speaking = false; updateUI(); if (state.continuous) setTimeout(() => startListening(), 800); });
    }

    // ============================================================
    //  TRANSCRIPT
    // ============================================================
    function sendMessage(text) { if (!text.trim()) return; subtitleEl.textContent = ''; const msg = JSON.stringify({ type: 'chat', text }); if (isConnected && ws.readyState === WebSocket.OPEN) ws.send(msg); }
    function addUserEntry(text) { const el = document.createElement('div'); el.className = 'entry'; el.innerHTML = `<div class="entry-label">YOU</div><div class="entry-text user">${text}</div>`; transcriptEl.appendChild(el); transcriptEl.scrollTop = transcriptEl.scrollHeight; }
    function addAIEntry(text) { const el = document.createElement('div'); el.className = 'entry'; el.innerHTML = `<div class="entry-label">OICHI</div><div class="entry-text ai">${text}</div>`; transcriptEl.appendChild(el); transcriptEl.scrollTop = transcriptEl.scrollHeight; }
    function updateLastAIEntry(text) {
        let last = transcriptEl.querySelector('.entry:last-child .entry-text.ai');
        if (!last || last.parentElement.querySelector('.entry-label').textContent !== 'ZIFANG') {
            const el = document.createElement('div'); el.className = 'entry'; el.innerHTML = `<div class="entry-label">ZIFANG</div><div class="entry-text ai">${text}</div>`; transcriptEl.appendChild(el);
        } else { last.textContent = text; }
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }

    // ============================================================
    //  CONTROLS
    // ============================================================
    document.getElementById('btn-mic').addEventListener('click', () => { if (isRecognizing) stopListening(); else startListening(); });
    document.getElementById('btn-mic').addEventListener('mousedown', () => { if (!isRecognizing) startListening(); });
    document.getElementById('btn-clear').addEventListener('click', () => { transcriptEl.innerHTML = '<div class="entry"><div class="entry-label">ZIFANG</div>                <div class="entry-text ai">对话已清空。主公想聊点什么呢？</div></div>'; });
    document.addEventListener('keydown', (e) => { if (e.ctrlKey && e.code === 'Space') { e.preventDefault(); if (isRecognizing) stopListening(); else startListening(); } if (e.code === 'Escape') stopListening(); });

    // ============================================================
    //  INIT
    // ============================================================
    updateUI();
    initLive2D().then(() => { render(); }).catch(() => { render(); });
    setTimeout(() => { if (!isRecognizing && state.continuous) startListening(); }, 2000);
